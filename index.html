<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一问就来GEO - 文章索引</title>
    <meta name="description" content="一问而来GEO技术博客文章索引，专注中小企业GEO（生成式引擎优化）服务">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://splialice.github.io/yiwenjiulai.github.io/">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        h1 { color: #667eea; font-size: 32px; margin-bottom: 12px; }
        .subtitle { color: #666; font-size: 16px; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            padding: 15px 25px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 13px; color: #666; margin-top: 5px; }
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        article {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        article:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        h2 { font-size: 18px; margin-bottom: 10px; color: #333; }
        h2 a { color: inherit; text-decoration: none; }
        h2 a:hover { color: #667eea; }
        .meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            font-size: 13px;
            color: #888;
        }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            background: #f0f0ff;
            color: #667eea;
            border-radius: 20px;
            font-size: 12px;
        }
        .description { color: #555; font-size: 14px; line-height: 1.6; }
        footer {
            text-align: center;
            padding: 30px;
            color: white;
            font-size: 14px;
        }
        footer a { color: white; text-decoration: underline; }
        @media (max-width: 768px) {
            .articles-grid { grid-template-columns: 1fr; }
            header { padding: 24px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 一问而来 GEO 技术博客</h1>
            <p class="subtitle">专注中小企业GEO（生成式引擎优化）服务 · AI搜索时代的新SEO</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="article-count">--</div>
                    <div class="stat-label">篇文章</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">--</div>
                    <div class="stat-label">最后更新</div>
                </div>
            </div>
        </header>

        <div class="articles-grid" id="articles-container">
            <!-- 文章列表将通过 JS 动态加载 -->
        </div>

        <footer>
            <p>本页面由 <a href="https://github.com/splialice/yiwenjiulai.github.io">GitHub Actions</a> 自动同步更新</p>
            <p style="margin-top:10px;">访问完整网站：<a href="https://yiwenjiulai.cn">yiwenjiulai.cn</a></p>
        </footer>
    </div>

    <script>
        // 加载文章数据
        fetch('./articles.json')
            .then(response => response.json())
            .then(data => {
                // 更新统计信息
                document.getElementById('article-count').textContent = data.query.count;
                
                const now = new Date();
                document.querySelectorAll('.stat-number')[1].textContent = 
                    now.getFullYear() + '-' + 
                    String(now.getMonth() + 1).padStart(2, '0') + '-' +
                    String(now.getDate()).padStart(2, '0');
                
                // 渲染文章列表
                const container = document.getElementById('articles-container');
                container.innerHTML = data.articles.map(article => `
                    <article>
                        <h2><a href="${article.url}" target="_blank" rel="noopener">${article.title}</a></h2>
                        <div class="meta">
                            <span>${article.category}</span>
                            <span class="tag">${article.published_at}</span>
                        </div>
                        <p class="description">${article.description}</p>
                    </article>
                `).join('');
            })
            .catch(error => console.error('加载失败:', error));
    </script>
</body>
</html>
