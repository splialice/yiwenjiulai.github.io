name: Sync Articles to GitHub Pages

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时执行一次（北京时间 2/8/14/20 点）
  workflow_dispatch:        # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest articles from main site
        id: fetch_articles
        run: |
          echo "📡 正在从主站拉取最新文章..."
          
          # 从主站 API 获取最近 30 天的文章
          RESPONSE=$(curl -s "https://yiwenjiulai.cn/admin/articles_feed.php?format=json&days=30&limit=100")
          
          # 检查响应
          if [ -z "$RESPONSE" ]; then
            echo "::error::无法获取文章数据，主站可能不可用"
            exit 1
          fi
          
          # 保存响应到文件供后续步骤使用
          echo "$RESPONSE" > articles_data.json
          
          # 提取文章数量
          COUNT=$(echo "$RESPONSE" | jq '.query.count')
          echo "✅ 成功获取 $COUNT 篇文章"
          echo "article_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Generate GitHub Pages content
        run: |
          mkdir -p github-pages
          
          # 1. 生成文章索引 JSON（原始数据）
          cp articles_data.json github-pages/articles.json
          
          # 2. 生成 sitemap.xml
          cat > github-pages/sitemap.xml << 'XMLEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          XMLEOF
          
          # 用 jq 解析 JSON 并生成 sitemap 条目
          cat articles_data.json | jq -r '
            .articles[] |
            "  <url>\n    <loc>" + .url + "</loc>\n    <lastmod>" + .updated_at + "</lastmod>\n    <changefreq>weekly</changefreq>\n    <priority>0.8</priority>\n  </url>"
          ' >> github-pages/sitemap.xml
          
          echo '</urlset>' >> github-pages/sitemap.xml
          
          # 3. 生成文章列表 HTML 页面
          cat > github-pages/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>一问就来GEO - 文章索引</title>
              <meta name="description" content="一问而来GEO技术博客文章索引，专注中小企业GEO（生成式引擎优化）服务">
              <meta name="robots" content="index, follow">
              <link rel="canonical" href="https://splialice.github.io/yiwenjiulai.github.io/">
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                      line-height: 1.6;
                      color: #333;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      padding: 20px;
                  }
                  .container { max-width: 1200px; margin: 0 auto; }
                  header {
                      background: white;
                      padding: 40px;
                      border-radius: 16px;
                      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
                      margin-bottom: 30px;
                      text-align: center;
                  }
                  h1 { color: #667eea; font-size: 32px; margin-bottom: 12px; }
                  .subtitle { color: #666; font-size: 16px; }
                  .stats {
                      display: flex;
                      justify-content: center;
                      gap: 30px;
                      margin-top: 20px;
                      flex-wrap: wrap;
                  }
                  .stat-item {
                      text-align: center;
                      padding: 15px 25px;
                      background: #f8f9fa;
                      border-radius: 12px;
                  }
                  .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
                  .stat-label { font-size: 13px; color: #666; margin-top: 5px; }
                  .articles-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                      gap: 20px;
                  }
                  article {
                      background: white;
                      padding: 24px;
                      border-radius: 12px;
                      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
                      transition: transform 0.3s, box-shadow 0.3s;
                  }
                  article:hover {
                      transform: translateY(-4px);
                      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
                  }
                  h2 { font-size: 18px; margin-bottom: 10px; color: #333; }
                  h2 a { color: inherit; text-decoration: none; }
                  h2 a:hover { color: #667eea; }
                  .meta {
                      display: flex;
                      gap: 12px;
                      flex-wrap: wrap;
                      margin-bottom: 12px;
                      font-size: 13px;
                      color: #888;
                  }
                  .tag {
                      display: inline-block;
                      padding: 3px 10px;
                      background: #f0f0ff;
                      color: #667eea;
                      border-radius: 20px;
                      font-size: 12px;
                  }
                  .description { color: #555; font-size: 14px; line-height: 1.6; }
                  footer {
                      text-align: center;
                      padding: 30px;
                      color: white;
                      font-size: 14px;
                  }
                  footer a { color: white; text-decoration: underline; }
                  @media (max-width: 768px) {
                      .articles-grid { grid-template-columns: 1fr; }
                      header { padding: 24px; }
                      h1 { font-size: 24px; }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <header>
                      <h1>🚀 一问而来 GEO 技术博客</h1>
                      <p class="subtitle">专注中小企业GEO（生成式引擎优化）服务 · AI搜索时代的新SEO</p>
                      <div class="stats">
                          <div class="stat-item">
                              <div class="stat-number" id="article-count">--</div>
                              <div class="stat-label">篇文章</div>
                          </div>
                          <div class="stat-item">
                              <div class="stat-number">--</div>
                              <div class="stat-label">最后更新</div>
                          </div>
                      </div>
                  </header>

                  <div class="articles-grid" id="articles-container">
                      <!-- 文章列表将通过 JS 动态加载 -->
                  </div>

                  <footer>
                      <p>本页面由 <a href="https://github.com/splialice/yiwenjiulai.github.io">GitHub Actions</a> 自动同步更新</p>
                      <p style="margin-top:10px;">访问完整网站：<a href="https://yiwenjiulai.cn">yiwenjiulai.cn</a></p>
                  </footer>
              </div>

              <script>
                  // 加载文章数据
                  fetch('./articles.json')
                      .then(response => response.json())
                      .then(data => {
                          // 更新统计信息
                          document.getElementById('article-count').textContent = data.query.count;
                          
                          const now = new Date();
                          document.querySelectorAll('.stat-number')[1].textContent = 
                              now.getFullYear() + '-' + 
                              String(now.getMonth() + 1).padStart(2, '0') + '-' +
                              String(now.getDate()).padStart(2, '0');
                          
                          // 渲染文章列表
                          const container = document.getElementById('articles-container');
                          container.innerHTML = data.articles.map(article => `
                              <article>
                                  <h2><a href="${article.url}" target="_blank" rel="noopener">${article.title}</a></h2>
                                  <div class="meta">
                                      <span>${article.category}</span>
                                      <span class="tag">${article.published_at}</span>
                                  </div>
                                  <p class="description">${article.description}</p>
                              </article>
                          `).join('');
                      })
                      .catch(error => console.error('加载失败:', error));
              </script>
          </body>
          </html>
          HTMLEOF
          
          # 4. 为每篇文章创建单独的重定向页（301 跳转到主站）
          mkdir -p github-pages/articles
          
          cat articles_data.json | jq -r '.articles[] | @uri " \(.slug) \"\(.url)"\"' | while read slug url; do
              cat > "github-pages/articles/${slug}.html" << REDIRECT_EOF
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="0; url=${url}">
              <script>window.location.href = "${url}";</script>
              <link rel="canonical" href="${url}">
              <meta name="robots" content="index, follow">
          </head>
          <body>
              <p>正在跳转到原文：<a href="${url}">${url}</a></p>
          </body>
          </html>
          REDIRECT_EOF
          done
          
          echo "✅ GitHub Pages 内容生成完成"
          ls -la github-pages/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github-pages
          publish_branch: gh-pages
          force_orphan: true

      - name: Push IndexNow notification
        if: success()
        run: |
          echo "📢 正在通过 IndexNow 通知搜索引擎..."
          
          # 获取所有新文章 URL
          URLS=$(cat articles_data.json | jq -r '.articles[].url' | tr '\n' ',' | sed 's/,$//')
          
          # 推送到 IndexNow（Bing + 百度）
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"splialice.github.io\",
              \"key\": \"51773d28057a42208253a6c1daeeedf2\",
              \"urlList\": $(cat articles_data.json | jq '[.articles[].url]')
            }"
          
          echo "✅ IndexNow 推送完成"

      - name: Summary
        run: |
          echo "## 🎉 同步完成！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**同步统计**：" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 文章数量：${{ steps.fetch_articles.outputs.article_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⏰ 同步时间：$(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 GitHub Pages：[查看](https://splialice.github.io/yiwenjiulai.github.io/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**生成的文件**：" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ index.html（文章列表页）" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ articles.json（数据源）" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ sitemap.xml（站点地图）" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ articles/*.html（文章重定向页）" >> $GITHUB_STEP_SUMMARY